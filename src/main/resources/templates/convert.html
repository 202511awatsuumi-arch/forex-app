<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通貨換算</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/}">ホーム</a>
    <a th:href="@{/convert}">換算</a>
    <a th:href="@{/history}">履歴</a>
    <a th:href="@{/alerts}">アラート</a>
</nav>
<div class="container">
    <h1>通貨換算</h1>
    <div class="card">
        <p class="desc">
            USD・JPY・EURの3通貨間で換算できます。変換元と変換先を選んで「換算する」を押してください。
        </p>

        <div class="form-row">
            <label class="label" for="amount">金額</label>
            <input type="number" id="amount" value="100" min="0" step="0.01">

            <label class="label" for="from">変換元</label>
            <select id="from"></select>

            <span class="arrow">→</span>

            <label class="label" for="to">変換先</label>
            <select id="to"></select>

            <button id="convertButton" type="button">換算する</button>
        </div>

        <div id="message" class="desc" aria-live="polite"></div>
        <div id="result"></div>
    </div>
</div>

<script>
(() => {
    const currencies = ["USD", "JPY", "EUR"];
    const currencyNames = {
        USD: "米ドル",
        JPY: "日本円",
        EUR: "ユーロ"
    };

    const amountInput = document.getElementById("amount");
    const fromSelect = document.getElementById("from");
    const toSelect = document.getElementById("to");
    const convertButton = document.getElementById("convertButton");
    const messageEl = document.getElementById("message");
    const resultEl = document.getElementById("result");

    function clearStatus() {
        messageEl.textContent = "";
        resultEl.innerHTML = "";
    }

    function showError(message) {
        messageEl.textContent = message;
        resultEl.innerHTML = "";
    }

    function setFromOptions() {
        fromSelect.innerHTML = "";
        currencies.forEach((code) => {
            const option = document.createElement("option");
            option.value = code;
            option.textContent = `${code} (${currencyNames[code]})`;
            fromSelect.appendChild(option);
        });
        fromSelect.value = "USD";
    }

    function setToOptions() {
        const from = fromSelect.value;
        const prev = toSelect.value;
        toSelect.innerHTML = "";

        currencies
            .filter((code) => code !== from)
            .forEach((code) => {
                const option = document.createElement("option");
                option.value = code;
                option.textContent = `${code} (${currencyNames[code]})`;
                if (code === prev) {
                    option.selected = true;
                }
                toSelect.appendChild(option);
            });

        if (!toSelect.value) {
            toSelect.selectedIndex = 0;
        }
    }

    async function convertCurrency() {
        clearStatus();

        const from = fromSelect.value;
        const to = toSelect.value;
        const amount = amountInput.value;

        if (!amount || Number(amount) < 0) {
            showError("金額を正しく入力してください。");
            return;
        }

        try {
            const params = new URLSearchParams({ from, to, amount });
            const response = await fetch(`/api/convert?${params.toString()}`);

            if (!response.ok) {
                throw new Error("API呼び出しに失敗しました");
            }

            const data = await response.json();
            const formattedAmount = Number(data.amount).toLocaleString();
            const formattedResult = Number(data.result).toLocaleString(undefined, {
                minimumFractionDigits: 4,
                maximumFractionDigits: 4
            });

            resultEl.innerHTML =
                `<div class="result-box">${formattedAmount} ${data.from} = <strong>${formattedResult}</strong> ${data.to}</div>`;
        } catch (error) {
            showError("換算に失敗しました。しばらくしてから再試行してください。");
        }
    }

    fromSelect.addEventListener("change", setToOptions);
    convertButton.addEventListener("click", convertCurrency);

    setFromOptions();
    setToOptions();
})();
</script>
</body>
</html>
