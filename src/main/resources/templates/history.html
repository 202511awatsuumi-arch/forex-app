<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レート履歴</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/}">ホーム</a>
    <a th:href="@{/convert}">換算</a>
    <a th:href="@{/history}">履歴</a>
    <a th:href="@{/alerts}">アラート</a>
</nav>

<div class="container">
    <h1>レート履歴</h1>

    <div class="card">
        <p class="desc">この画面では、DBに保存されているUSD基準の履歴（USD/JPY・USD/EUR）を表示します。</p>

        <div class="form-row">
            <span class="label">基準通貨: USD（固定）</span>

            <label class="label" for="to">to</label>
            <select id="to">
                <option value="JPY">JPY</option>
                <option value="EUR">EUR</option>
            </select>

            <button id="loadButton" type="button">取得</button>
        </div>

        <div id="message" class="desc" aria-live="polite"></div>

        <table id="historyTable" style="display:none;">
            <thead>
            <tr>
                <th>日付</th>
                <th>通貨ペア</th>
                <th>レート</th>
                <th>取得日時</th>
            </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
(() => {
    const FIXED_FROM = "USD";

    const toSelect = document.getElementById("to");
    const loadButton = document.getElementById("loadButton");
    const messageEl = document.getElementById("message");
    const tableEl = document.getElementById("historyTable");
    const tbodyEl = document.getElementById("historyBody");

    function clearTable() {
        tbodyEl.innerHTML = "";
        tableEl.style.display = "none";
    }

    function showMessage(message) {
        messageEl.textContent = message;
    }

    function formatRate(value) {
        return Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 6
        });
    }

    function formatDateTime(value) {
        if (!value) return "-";
        return value.replace("T", " ");
    }

    function renderHistory(from, to, history) {
        clearTable();

        history.forEach((item) => {
            const tr = document.createElement("tr");
            tr.innerHTML =
                `<td>${item.fetchedDate ?? "-"}</td>` +
                `<td>${from}/${to}</td>` +
                `<td>${formatRate(item.rate)}</td>` +
                `<td>${formatDateTime(item.fetchedAt)}</td>`;
            tbodyEl.appendChild(tr);
        });

        tableEl.style.display = "table";
    }

    async function loadHistory() {
        clearTable();
        showMessage("");

        const from = FIXED_FROM;
        const to = toSelect.value;

        try {
            const params = new URLSearchParams({ from, to });
            const response = await fetch(`/api/rates/history?${params.toString()}`);

            if (!response.ok) {
                throw new Error("API呼び出しに失敗しました");
            }

            const data = await response.json();

            if (!Array.isArray(data) || data.length === 0) {
                showMessage("履歴データを取得できませんでした。起動時のレート取得処理を確認してください。");
                return;
            }

            renderHistory(from, to, data);
        } catch (error) {
            showMessage("履歴データを取得できませんでした。起動時のレート取得処理を確認してください。");
        }
    }

    loadButton.addEventListener("click", loadHistory);
})();
</script>
</body>
</html>
