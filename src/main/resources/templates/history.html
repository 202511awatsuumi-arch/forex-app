<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レート履歴</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .history-table-wrapper {
            max-height: 420px;
            overflow: auto;
        }
        #historyTable {
            min-width: 760px;
            width: max-content;
        }
        .history-chart-wrap {
            display: none;
            margin-top: 12px;
            position: relative;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            background: #ffffff;
            padding: 8px 88px 8px 8px;
        }
        .history-chart-scroll {
            overflow-x: auto;
            overflow-y: hidden;
        }
        .history-chart-rate-badge {
            position: absolute;
            right: 10px;
            transform: translateY(-50%);
            background: #1a73e8;
            color: #ffffff;
            font-size: 12px;
            line-height: 1;
            padding: 6px 8px;
            border-radius: 6px;
            white-space: nowrap;
            display: none;
            pointer-events: none;
        }
        .history-chart-scale {
            position: absolute;
            top: 8px;
            right: 48px;
            width: 70px;
            height: 320px;
            pointer-events: none;
            display: none;
        }
        .history-chart-scale-item {
            position: absolute;
            right: 0;
            transform: translateY(-50%);
            font-size: 11px;
            color: #333333;
            background: rgba(255, 255, 255, 0.9);
            padding: 1px 2px;
            border-radius: 2px;
        }

        .history-pagination {
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .history-pagination button {
            margin: 0 6px;
        }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}">ホーム</a>
    <a th:href="@{/convert}">換算</a>
    <a th:href="@{/history}">履歴</a>
    <a th:href="@{/alerts}">アラート</a>
</nav>

<div class="container">
    <h1>レート履歴</h1>

    <div class="card">
        <p class="desc">この画面では、DBに保存されているUSD基準の履歴（USD/JPY・USD/EUR）を表示します。</p>

        <div class="form-row">
            <span class="label">基準通貨: USD（固定）</span>

            <label class="label" for="to">to</label>
            <select id="to">
                <option value="JPY">JPY</option>
                <option value="EUR">EUR</option>
            </select>

            <label class="label" for="dateFrom">FROM</label>
            <input id="dateFrom" type="date">

            <label class="label" for="dateTo">TO</label>
            <input id="dateTo" type="date">

            <button id="loadButton" type="button">表示/検索</button>
            <button id="chartToggleButton" type="button">グラフ</button>
        </div>

        <div id="message" class="desc" aria-live="polite"></div>

        <div id="historyChartWrap" class="history-chart-wrap">
            <div id="historyChartScroll" class="history-chart-scroll">
                <canvas id="historyChart" width="900" height="320" style="display:none;"></canvas>
            </div>
            <div id="historyChartScale" class="history-chart-scale"></div>
            <div id="historyChartRateBadge" class="history-chart-rate-badge"></div>
        </div>

        <div style="margin-top:12px;">
        <div id="historyTableWrapper" class="history-table-wrapper" style="display:none;">
            <table id="historyTable" style="display:none;">
                <thead>
                <tr>
                    <th>日付</th>
                    <th>FROM</th>
                    <th>TO</th>
                    <th>レート</th>
                    <th>取得日時</th>
                </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
        <div id="historyPagination" class="history-pagination">
            <button id="historyPrevButton" type="button">前へ</button>
            <span id="historyPageInfo"></span>
            <button id="historyNextButton" type="button">次へ</button>
        </div>
        </div>
    </div>
</div>

<script>
(() => {
    const FIXED_FROM = "USD";

    const toSelect = document.getElementById("to");
    const dateFromInput = document.getElementById("dateFrom");
    const dateToInput = document.getElementById("dateTo");
    const loadButton = document.getElementById("loadButton");
    const chartToggleButton = document.getElementById("chartToggleButton");
    const messageEl = document.getElementById("message");
    const tableEl = document.getElementById("historyTable");
    const tbodyEl = document.getElementById("historyBody");
    const chartEl = document.getElementById("historyChart");
    const chartWrapEl = document.getElementById("historyChartWrap");
    const chartScrollEl = document.getElementById("historyChartScroll");
    const chartScaleEl = document.getElementById("historyChartScale");
    const chartRateBadgeEl = document.getElementById("historyChartRateBadge");
    const tableWrapperEl = document.getElementById("historyTableWrapper");
    const paginationEl = document.getElementById("historyPagination");
    const prevButtonEl = document.getElementById("historyPrevButton");
    const nextButtonEl = document.getElementById("historyNextButton");
    const pageInfoEl = document.getElementById("historyPageInfo");

    const PAGE_SIZE = 20;
    let currentPage = 1;
    let paginatedRows = [];
    let currentFrom = FIXED_FROM;
    let currentTo = "JPY";
    let isChartVisible = false;
    let chartRows = [];
    let currentChartFrom = FIXED_FROM;
    let currentChartTo = "JPY";
    let chartPoints = [];
    let chartMargin = { top: 20, right: 110, bottom: 72, left: 60 };
    let chartMinRate = 0;
    let chartMaxRate = 0;
    let chartPlotHeight = 0;

    function formatChartDate(value) {
        return String(value ?? "").replace(/-/g, "/");
    }

    function hideTableArea() {
        tableEl.style.display = "none";
        tableWrapperEl.style.display = "none";
        paginationEl.style.display = "none";
    }

    function showTableArea() {
        renderHistoryPage();
    }

    function clearTable() {
        tbodyEl.innerHTML = "";
        hideTableArea();
        pageInfoEl.textContent = "";
        currentPage = 1;
        paginatedRows = [];
        clearChart();
    }

    function clearChart() {
        const ctx = chartEl.getContext("2d");
        ctx.clearRect(0, 0, chartEl.width, chartEl.height);
        chartEl.style.display = "none";
        chartWrapEl.style.display = "none";
        chartScaleEl.style.display = "none";
        chartScaleEl.innerHTML = "";
        chartRateBadgeEl.style.display = "none";
        chartRateBadgeEl.textContent = "";
        chartPoints = [];
        chartScrollEl.scrollLeft = 0;
    }

    function updateRightVisibleRate() {
        if (chartPoints.length === 0) return;
        const visibleRightX = chartScrollEl.scrollLeft + chartScrollEl.clientWidth;
        let target = chartPoints[0];
        for (const point of chartPoints) {
            if (point.x <= visibleRightX) {
                target = point;
            } else {
                break;
            }
        }
        if (visibleRightX < chartPoints[0].x) {
            target = chartPoints[0];
        }

        const yRatio = (chartMaxRate - target.rate) / (chartMaxRate - chartMinRate);
        const y = chartMargin.top + yRatio * chartPlotHeight;
        chartRateBadgeEl.textContent = formatRate(target.rate);
        chartRateBadgeEl.style.top = `${Math.round(y)}px`;
        if (isChartVisible) {
            chartRateBadgeEl.style.display = "block";
        }
    }

    function showMessage(message) {
        messageEl.textContent = message;
    }

    function formatRate(value) {
        return Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 6
        });
    }

    function formatDateTime(value) {
        if (!value) return "-";
        return value.replace("T", " ");
    }

    function filterByDateRange(history) {
        const fromDate = dateFromInput.value;
        const toDate = dateToInput.value;
        return history.filter((item) => {
            const fetchedDate = String(item.fetchedDate ?? "");
            if (!fetchedDate) return false;
            if (fromDate && fetchedDate < fromDate) return false;
            if (toDate && fetchedDate > toDate) return false;
            return true;
        });
    }

    function parseDate(value) {
        return new Date(`${value}T00:00:00`);
    }

    function toDateOnly(date) {
        return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function daysInclusive(from, to) {
        const msPerDay = 24 * 60 * 60 * 1000;
        return Math.floor((to.getTime() - from.getTime()) / msPerDay) + 1;
    }

    function renderHistory(from, to, history) {
        clearTable();

        currentFrom = from;
        currentTo = to;
        paginatedRows = [...history]
            .sort((a, b) => String(b.fetchedDate ?? "").localeCompare(String(a.fetchedDate ?? "")));
        currentPage = 1;
        renderHistoryPage();

        chartRows = [...history]
            .sort((a, b) => String(a.fetchedDate ?? "").localeCompare(String(b.fetchedDate ?? "")));
        currentChartFrom = from;
        currentChartTo = to;
    }

    function renderHistoryPage() {
        tbodyEl.innerHTML = "";

        const totalPages = Math.max(1, Math.ceil(paginatedRows.length / PAGE_SIZE));
        if (currentPage > totalPages) {
            currentPage = totalPages;
        }
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageRows = paginatedRows.slice(start, start + PAGE_SIZE);

        pageRows.forEach((item) => {
            const tr = document.createElement("tr");
            tr.innerHTML =
                `<td>${item.fetchedDate ?? "-"}</td>` +
                `<td>${currentFrom}</td>` +
                `<td>${currentTo}</td>` +
                `<td>${formatRate(item.rate)}</td>` +
                `<td>${formatDateTime(item.fetchedAt)}</td>`;
            tbodyEl.appendChild(tr);
        });

        tableWrapperEl.style.display = "block";
        tableEl.style.display = "table";

        if (totalPages <= 1) {
            paginationEl.style.display = "none";
            return;
        }

        paginationEl.style.display = "block";
        pageInfoEl.textContent = `${currentPage} / ${totalPages}`;
        prevButtonEl.disabled = currentPage <= 1;
        nextButtonEl.disabled = currentPage >= totalPages;
    }

    function renderHistoryChart(history, from, to) {
        const ctx = chartEl.getContext("2d");
        const minStep = 48;
        const computedWidth = Math.max(900, chartMargin.left + chartMargin.right + minStep * Math.max(1, history.length - 1));
        chartEl.width = computedWidth;
        chartEl.height = 320;
        const width = chartEl.width;
        const height = chartEl.height;
        const margin = chartMargin;
        const plotW = width - margin.left - margin.right;
        const plotH = height - margin.top - margin.bottom;
        chartPlotHeight = plotH;

        const rates = history.map((h) => Number(h.rate));
        let minRate = Math.min(...rates);
        let maxRate = Math.max(...rates);
        if (minRate === maxRate) {
            const pad = minRate === 0 ? 1 : Math.abs(minRate) * 0.05;
            minRate -= pad;
            maxRate += pad;
        } else {
            const pad = (maxRate - minRate) * 0.1;
            minRate -= pad;
            maxRate += pad;
        }
        chartMinRate = minRate;
        chartMaxRate = maxRate;

        const xAt = (i) => {
            if (history.length === 1) return margin.left + plotW / 2;
            return margin.left + (plotW * i) / (history.length - 1);
        };
        const yAt = (r) => margin.top + ((maxRate - r) / (maxRate - minRate)) * plotH;

        ctx.clearRect(0, 0, width, height);

        ctx.fillStyle = "#333333";
        ctx.font = "12px sans-serif";
        const yTicks = 5;
        const scaleItems = [];
        const yGridPositions = [];
        for (let i = 0; i < yTicks; i++) {
            const t = i / (yTicks - 1);
            const value = maxRate - (maxRate - minRate) * t;
            const y = margin.top + plotH * t;
            yGridPositions.push(y);
            scaleItems.push({ y, value: value.toFixed(4) });
        }

        const visibleWidth = Math.max(1, chartScrollEl.clientWidth);
        const desiredVisibleLabels = 3;
        const pxPerLabel = Math.max(120, Math.floor(visibleWidth / desiredVisibleLabels));
        const approxVisiblePoints = Math.max(1, Math.floor(visibleWidth / minStep));
        const xLabelStep = Math.max(1, Math.ceil(approxVisiblePoints / desiredVisibleLabels));
        const drawEveryPoints = Math.max(1, Math.ceil(pxPerLabel / minStep));
        const effectiveLabelStep = Math.max(xLabelStep, drawEveryPoints);
        const xGridPositions = [];
        const xLabelItems = [];
        ctx.fillStyle = "#333333";
        ctx.font = "11px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        history.forEach((item, idx) => {
            const isLast = idx === history.length - 1;
            if (!isLast && idx % effectiveLabelStep !== 0) return;
            const x = xAt(idx);
            xGridPositions.push(x);
            xLabelItems.push({ x, label: formatChartDate(item.fetchedDate) });
        });

        // 1) background is clearRect above, 2) draw subtle grid lines.
        ctx.strokeStyle = "#d7dfe8";
        ctx.lineWidth = 1.2;
        yGridPositions.forEach((y) => {
            ctx.beginPath();
            ctx.moveTo(margin.left, y);
            ctx.lineTo(margin.left + plotW, y);
            ctx.stroke();
        });
        xGridPositions.forEach((x) => {
            ctx.beginPath();
            ctx.moveTo(x, margin.top);
            ctx.lineTo(x, margin.top + plotH);
            ctx.stroke();
        });

        // 3) draw axes after grid so axes stay clearer than grid.
        ctx.strokeStyle = "#cccccc";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(margin.left, margin.top);
        ctx.lineTo(margin.left, margin.top + plotH);
        ctx.moveTo(margin.left + plotW, margin.top);
        ctx.lineTo(margin.left + plotW, margin.top + plotH);
        ctx.stroke();

        ctx.fillStyle = "#333333";
        ctx.font = "11px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        xLabelItems.forEach((item) => {
            ctx.save();
            ctx.translate(item.x - 4, margin.top + plotH + 12);
            ctx.rotate(Math.PI / 2);
            ctx.fillText(item.label, 0, 0);
            ctx.restore();
        });

        ctx.strokeStyle = "#1f77b4";
        ctx.lineWidth = 2;
        ctx.beginPath();
        chartPoints = [];
        history.forEach((item, idx) => {
            const x = xAt(idx);
            const y = yAt(Number(item.rate));
            chartPoints.push({ x, rate: Number(item.rate) });
            if (idx === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();

        ctx.fillStyle = "#1f77b4";
        history.forEach((item, idx) => {
            const x = xAt(idx);
            const y = yAt(Number(item.rate));
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.fillStyle = "#111111";
        ctx.font = "bold 13px sans-serif";
        ctx.fillText(`${from}/${to} レート推移`, margin.left, 14);

        chartWrapEl.style.display = "block";
        chartEl.style.display = "block";
        chartScaleEl.innerHTML = scaleItems
            .map((item) => `<div class="history-chart-scale-item" style="top:${Math.round(item.y)}px;">${item.value}</div>`)
            .join("");
        chartScaleEl.style.display = "block";
        if (isChartVisible) {
            chartRateBadgeEl.style.display = "block";
        }
        chartScrollEl.scrollLeft = Math.max(0, chartScrollEl.scrollWidth - chartScrollEl.clientWidth);
        updateRightVisibleRate();
    }

    async function loadHistory() {
        clearTable();
        clearChart();
        isChartVisible = false;
        chartRows = [];

        const fromDate = dateFromInput.value;
        const toDate = dateToInput.value;
        const today = toDateOnly(new Date());
        const fromObj = fromDate ? parseDate(fromDate) : null;
        const toObj = toDate ? parseDate(toDate) : null;

        if (!fromDate && !toDate) {
            showMessage("FROM または TO のいずれかを入力してください。");
            return;
        }
        if (fromDate && toDate && fromDate > toDate) {
            showMessage("FROM は TO 以前の日付を指定してください。");
            return;
        }
        if (fromObj && fromObj > today) {
            showMessage("FROM は今日以前の日付を指定してください。");
            return;
        }
        if (toObj && toObj > today) {
            showMessage("TO は今日以前の日付を指定してください。");
            return;
        }
        if (fromObj && toObj && daysInclusive(fromObj, toObj) > 365) {
            showMessage("期間は最大365日以内で指定してください。");
            return;
        }
        if (fromObj && !toObj && daysInclusive(fromObj, today) > 365) {
            showMessage("期間は最大365日以内で指定してください。");
            return;
        }

        const from = FIXED_FROM;
        const to = toSelect.value;

        try {
            clearTable();
            showMessage("");
            const params = new URLSearchParams({ from, to });
            if (fromDate) {
                params.set("fromDate", fromDate);
            }
            if (toDate) {
                params.set("toDate", toDate);
            }
            const response = await fetch(`/api/rates/history?${params.toString()}`);

            if (!response.ok) {
                throw new Error("API呼び出しに失敗しました");
            }

            const data = await response.json();

            if (!Array.isArray(data) || data.length === 0) {
                showMessage("履歴データを取得できませんでした。起動時のレート取得処理を確認してください。");
                return;
            }

            const filtered = filterByDateRange(data);
            if (filtered.length === 0) {
                showMessage("指定期間の履歴データはありません。");
                return;
            }

            renderHistory(from, to, filtered);
            isChartVisible = false;
            clearChart();
            showTableArea();
        } catch (error) {
            showMessage("履歴データを取得できませんでした。起動時のレート取得処理を確認してください。");
        }
    }

    loadButton.addEventListener("click", loadHistory);
    chartToggleButton.addEventListener("click", () => {
        if (chartRows.length === 0) return;

        isChartVisible = !isChartVisible;
        if (isChartVisible) {
            hideTableArea();
            renderHistoryChart(chartRows, currentChartFrom, currentChartTo);
            return;
        }
        clearChart();
        showTableArea();
    });
    chartScrollEl.addEventListener("scroll", () => {
        if (!isChartVisible) return;
        updateRightVisibleRate();
    });
    prevButtonEl.addEventListener("click", () => {
        if (currentPage <= 1) return;
        currentPage -= 1;
        renderHistoryPage();
    });
    nextButtonEl.addEventListener("click", () => {
        const totalPages = Math.max(1, Math.ceil(paginatedRows.length / PAGE_SIZE));
        if (currentPage >= totalPages) return;
        currentPage += 1;
        renderHistoryPage();
    });
})();
</script>
</body>
</html>
