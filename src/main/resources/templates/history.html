<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レート履歴</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav>
    <a th:href="@{/}">🏠 ホーム</a>
    <a th:href="@{/convert}">💱 換算</a>
    <a th:href="@{/history}">📈 履歴</a>
    <a th:href="@{/alerts}">🔔 アラート</a>
</nav>
<div class="container">
    <h1>レート履歴</h1>
    <div class="card">
        <p class="desc">
            過去30日間のレート推移をグラフで確認できます。<br>
            グラフを見ることで「円高・円安のトレンド」や「両替のベストタイミング」を判断する参考にできます。
        </p>
        <div class="form-row">
            <span class="label">通貨ペア</span>
            <select id="pair" onchange="loadChart()">
                <option value="USD,JPY">USD → JPY（米ドル / 日本円）</option>
                <option value="USD,EUR">USD → EUR（米ドル / ユーロ）</option>
            </select>
        </div>
        <canvas id="chart"></canvas>
        <p id="nodata" style="display:none; color:#999; text-align:center; padding:20px;">
            データがまだありません。毎朝9時にデータが蓄積されます。
        </p>
    </div>
</div>
<script>
    let chart = null;
    function loadChart() {
        const pair = document.getElementById('pair').value.split(',');
        const from = pair[0], to = pair[1];
        fetch('/api/rates/history?from='+from+'&to='+to)
            .then(r => r.json())
            .then(data => {
                if (chart) chart.destroy();
                if (!data || data.length === 0) {
                    document.getElementById('nodata').style.display = 'block';
                    return;
                }
                document.getElementById('nodata').style.display = 'none';
                chart = new Chart(document.getElementById('chart'), {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.fetchedAt
                            ? d.fetchedAt.substring(0,10) : ''),
                        datasets: [{
                            label: from + ' / ' + to,
                            data: data.map(d => d.rate),
                            borderColor: '#1a73e8',
                            backgroundColor: 'rgba(26,115,232,0.08)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: true },
                            tooltip: {
                                callbacks: {
                                    label: ctx => from+'/'+to+': '+ctx.parsed.y.toFixed(4)
                                }
                            }
                        },
                        scales: {
                            y: { beginAtZero: false }
                        }
                    }
                });
            });
    }
    loadChart();
</script>
</body>
</html>
