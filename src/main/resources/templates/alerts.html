<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アラート設定</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/}">ホーム</a>
    <a th:href="@{/convert}">換算</a>
    <a th:href="@{/history}">履歴</a>
    <a th:href="@{/alerts}">アラート</a>
</nav>

<div class="container">
    <h1>アラート設定</h1>

    <div class="card">
        <p class="desc">通貨ペア、閾値、条件を入力してアラートを登録します。</p>

        <div class="form-row">
            <span class="label">基準通貨 USD（固定）</span>

            <label class="label" for="targetCurrency">対象通貨</label>
            <select id="targetCurrency">
                <option value="JPY">JPY</option>
                <option value="EUR">EUR</option>
            </select>

            <label class="label" for="thresholdRate">通知レート</label>
            <input type="number" id="thresholdRate" placeholder="例: 150.00" step="0.01" min="0">

            <label class="label" for="alertType">通知条件</label>
            <select id="alertType">
                <option value="ABOVE">以上になったら通知</option>
                <option value="BELOW">以下になったら通知</option>
            </select>

            <button id="registerButton" type="button">登録</button>
        </div>

        <div id="formMessage" class="desc" aria-live="polite"></div>
    </div>

    <div class="card">
        <h2>アラート一覧</h2>
        <div id="listMessage" class="desc" aria-live="polite"></div>

        <div style="overflow-x:auto;">
            <table id="alertTable" style="display:none;">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>通貨ペア</th>
                    <th>閾値</th>
                    <th>条件</th>
                    <th>状態</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="alertTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
(() => {
    const formMessageEl = document.getElementById("formMessage");
    const listMessageEl = document.getElementById("listMessage");
    const tableEl = document.getElementById("alertTable");
    const tbodyEl = document.getElementById("alertTableBody");

    const targetCurrencyEl = document.getElementById("targetCurrency");
    const thresholdRateEl = document.getElementById("thresholdRate");
    const alertTypeEl = document.getElementById("alertType");
    const registerButton = document.getElementById("registerButton");

    function clearTable() {
        tbodyEl.innerHTML = "";
        tableEl.style.display = "none";
    }

    function clearMessages() {
        formMessageEl.textContent = "";
        listMessageEl.textContent = "";
    }

    function statusBadge(triggered) {
        if (triggered) {
            return '<span class="alert-badge badge-done">発火済み</span>';
        }
        return '<span class="alert-badge badge-wait">待機中</span>';
    }

    function conditionLabel(alertType) {
        return alertType === "ABOVE" ? "以上" : "以下";
    }

    function createRow(alert) {
        const tr = document.createElement("tr");
        tr.innerHTML =
            `<td>${alert.id}</td>` +
            `<td>${alert.baseCurrency}/${alert.targetCurrency}</td>` +
            `<td>${Number(alert.thresholdRate).toFixed(2)}</td>` +
            `<td>${conditionLabel(alert.alertType)}</td>` +
            `<td>${statusBadge(alert.triggered)}</td>` +
            `<td><button class="danger" type="button" data-id="${alert.id}">削除</button></td>`;
        return tr;
    }

    async function loadAlerts() {
        clearTable();
        listMessageEl.textContent = "読み込み中...";

        try {
            const response = await fetch("/api/alerts");
            if (!response.ok) {
                throw new Error("GET /api/alerts failed");
            }

            const alerts = await response.json();

            if (!Array.isArray(alerts) || alerts.length === 0) {
                listMessageEl.textContent = "アラートはありません";
                return;
            }

            listMessageEl.textContent = "";
            alerts.forEach((alert) => {
                tbodyEl.appendChild(createRow(alert));
            });
            tableEl.style.display = "table";
        } catch (error) {
            clearTable();
            listMessageEl.textContent = "アラート一覧の取得に失敗しました。";
        }
    }

    async function registerAlert() {
        formMessageEl.textContent = "";

        const thresholdRate = thresholdRateEl.value;
        if (!thresholdRate || Number(thresholdRate) < 0) {
            formMessageEl.textContent = "thresholdRate を正しく入力してください。";
            return;
        }

        const payload = {
            baseCurrency: "USD",
            targetCurrency: targetCurrencyEl.value,
            thresholdRate: Number(thresholdRate),
            alertType: alertTypeEl.value
        };

        try {
            const response = await fetch("/api/alerts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error("POST /api/alerts failed");
            }

            thresholdRateEl.value = "";
            formMessageEl.textContent = "アラートを登録しました。";
            await loadAlerts();
        } catch (error) {
            formMessageEl.textContent = "アラート登録に失敗しました。";
        }
    }

    async function deleteAlert(id) {
        try {
            const response = await fetch(`/api/alerts/${id}`, {
                method: "DELETE"
            });

            if (!response.ok) {
                throw new Error("DELETE /api/alerts/{id} failed");
            }

            await loadAlerts();
        } catch (error) {
            listMessageEl.textContent = "アラート削除に失敗しました。";
        }
    }

    registerButton.addEventListener("click", registerAlert);

    tbodyEl.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;

        const id = target.getAttribute("data-id");
        if (!id) return;

        deleteAlert(id);
    });

    clearMessages();
    loadAlerts();
})();
</script>
</body>
</html>
