spring.application.name=forex-app

# H2 データベース設定
spring.datasource.url=jdbc:h2:mem:forexdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 コンソール（ブラウザでDBを確認できる）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis設定
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# ログ設定（SQL を表示する）
logging.level.com.example.forex_app=DEBUG
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 外部APIキー（後で本物のキーに差し替え）
forex.api.key=YOUR_API_KEY_HERE
forex.api.base-url=https://v6.exchangerate-api.com/v6